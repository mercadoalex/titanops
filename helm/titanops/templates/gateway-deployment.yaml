{{- if .Values.gateway.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "titanops.fullname" . }}-gateway
  namespace: {{ include "titanops.namespace" . }}
  labels:
    {{- include "titanops.componentLabels" (dict "component" "gateway" "context" .) | nindent 4 }}
spec:
  replicas: {{ .Values.gateway.replicas }}
  selector:
    matchLabels:
      {{- include "titanops.componentSelectorLabels" (dict "component" "gateway" "context" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "titanops.componentLabels" (dict "component" "gateway" "context" .) | nindent 8 }}
    spec:
      serviceAccountName: {{ include "titanops.serviceAccountName" . }}
      containers:
        - name: gateway
          image: "{{ .Values.gateway.image.repository }}:{{ .Values.gateway.image.tag }}"
          imagePullPolicy: {{ .Values.gateway.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.gateway.port }}
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: TITANOPS_CLUSTER_NAME
              valueFrom:
                configMapKeyRef:
                  name: {{ include "titanops.configMapName" . }}
                  key: cluster-name
            - name: TITANOPS_OTLP_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "titanops.configMapName" . }}
                  key: otlp-endpoint
            - name: TITANOPS_GATEWAY_PORT
              value: {{ .Values.gateway.port | quote }}
            - name: TITANOPS_CORRELATION_URL
              value: "http://{{ include "titanops.fullname" . }}-correlation:50051"
            - name: TITANOPS_EVENT_BUS_URL
              value: "nats://{{ include "titanops.fullname" . }}-event-bus:{{ .Values.eventBus.port }}"
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.gateway.port }}
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: {{ .Values.gateway.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "titanops.fullname" . }}-gateway
  namespace: {{ include "titanops.namespace" . }}
  labels:
    {{- include "titanops.componentLabels" (dict "component" "gateway" "context" .) | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.gateway.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "titanops.componentSelectorLabels" (dict "component" "gateway" "context" .) | nindent 4 }}
{{- end }}
