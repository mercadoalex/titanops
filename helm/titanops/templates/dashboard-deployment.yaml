{{- if .Values.dashboard.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "titanops.fullname" . }}-dashboard
  namespace: {{ include "titanops.namespace" . }}
  labels:
    {{- include "titanops.componentLabels" (dict "component" "dashboard" "context" .) | nindent 4 }}
spec:
  replicas: {{ .Values.dashboard.replicas }}
  selector:
    matchLabels:
      {{- include "titanops.componentSelectorLabels" (dict "component" "dashboard" "context" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "titanops.componentLabels" (dict "component" "dashboard" "context" .) | nindent 8 }}
    spec:
      serviceAccountName: {{ include "titanops.serviceAccountName" . }}
      containers:
        - name: dashboard
          image: "{{ .Values.dashboard.image.repository }}:{{ .Values.dashboard.image.tag }}"
          imagePullPolicy: {{ .Values.dashboard.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.dashboard.port }}
              protocol: TCP
          env:
            - name: TITANOPS_GATEWAY_URL
              value: "http://{{ include "titanops.fullname" . }}-gateway:{{ .Values.gateway.port }}"
            - name: TITANOPS_DASHBOARD_PORT
              value: {{ .Values.dashboard.port | quote }}
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.dashboard.port }}
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.dashboard.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.dashboard.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "titanops.fullname" . }}-dashboard
  namespace: {{ include "titanops.namespace" . }}
  labels:
    {{- include "titanops.componentLabels" (dict "component" "dashboard" "context" .) | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.dashboard.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "titanops.componentSelectorLabels" (dict "component" "dashboard" "context" .) | nindent 4 }}
{{- end }}
