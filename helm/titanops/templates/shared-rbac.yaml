{{- if (include "titanops.anyComponentEnabled" .) }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "titanops.serviceAccountName" . }}
  namespace: {{ include "titanops.namespace" . }}
  labels:
    {{- include "titanops.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "titanops.fullname" . }}
  labels:
    {{- include "titanops.labels" . | nindent 4 }}
rules:
  # Base permissions for platform services (events, configmaps)
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch", "create"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  {{- if .Values.tlapix.enabled }}
  # Tlapix permissions: certificate and secret monitoring
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["certificates.k8s.io"]
    resources: ["certificatesigningrequests"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["cert-manager.io"]
    resources: ["certificates", "issuers", "clusterissuers"]
    verbs: ["get", "list", "watch"]
  {{- end }}
  {{- if .Values.earthworm.enabled }}
  # Earthworm permissions: node health monitoring and pod remediation
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: ["apps"]
    resources: ["deployments", "daemonsets", "replicasets", "statefulsets"]
    verbs: ["get", "list", "watch"]
  {{- end }}
  {{- if .Values.ebeecontrol.enabled }}
  # eBeeControl permissions: network policy and honeytoken management
  - apiGroups: [""]
    resources: ["services", "endpoints"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  {{- end }}
  {{- if .Values.quack.enabled }}
  # Quack permissions: scheduling and workload management
  - apiGroups: [""]
    resources: ["nodes", "pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["scheduling.k8s.io"]
    resources: ["priorityclasses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "watch", "update"]
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "titanops.fullname" . }}
  labels:
    {{- include "titanops.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "titanops.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "titanops.serviceAccountName" . }}
    namespace: {{ include "titanops.namespace" . }}
{{- end }}
