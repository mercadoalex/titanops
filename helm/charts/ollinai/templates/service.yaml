{{- if .Values.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "titanops.fullname" . }}
  namespace: {{ include "titanops.namespace" . }}
  labels:
    {{- include "titanops.componentLabels" (dict "component" "change-intelligence" "context" .) | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.webhookPort }}
      targetPort: webhook
      protocol: TCP
      name: webhook
    - port: {{ .Values.metricsPort }}
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    {{- include "titanops.componentSelectorLabels" (dict "component" "change-intelligence" "context" .) | nindent 4 }}
{{- end }}
